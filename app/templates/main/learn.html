{% extends 'base.html' %}
{% block title %}AI Tutor – edX Engineering{% endblock %}
{% block content %}
<div class="row" style="height: calc(100vh - 90px);">
  <!-- Sidebar: chat sessions -->
  <div class="col-md-3 col-lg-2 border-end d-flex flex-column" style="height:100%; overflow:hidden;">
    <div class="d-flex justify-content-between align-items-center py-2 px-1">
      <span class="fw-semibold small text-muted text-uppercase">Chats</span>
      <button class="btn btn-sm btn-primary" id="btn-new-chat" title="New chat">
        <i class="bi bi-plus-lg"></i>
      </button>
    </div>
    <div id="session-list" class="overflow-auto flex-grow-1 pe-1">
      <!-- sessions injected by JS -->
    </div>
  </div>

  <!-- Main chat area -->
  <div class="col-md-9 col-lg-10 d-flex flex-column" style="height:100%; overflow:hidden;">
    <div id="chat-placeholder" class="text-center text-muted m-auto">
      <i class="bi bi-chat-dots" style="font-size:4rem; color:#ccc;"></i>
      <p class="mt-3">Select a chat or start a new one</p>
      <button class="btn btn-primary" id="btn-new-chat-main">
        <i class="bi bi-plus-lg me-1"></i>New Chat
      </button>
    </div>
    <div id="chat-area" class="d-none d-flex flex-column h-100">
      <div class="py-2 px-3 border-bottom d-flex justify-content-between align-items-center">
        <span id="chat-title" class="fw-semibold"></span>
        <button class="btn btn-sm btn-outline-danger" id="btn-delete-session" title="Delete session">
          <i class="bi bi-trash"></i>
        </button>
      </div>
      <div id="messages" class="flex-grow-1 overflow-auto p-3">
        <!-- messages -->
      </div>
      <div class="border-top p-3">
        <form id="chat-form" class="d-flex gap-2">
          <input type="text" id="chat-input" class="form-control"
                 placeholder="Ask anything about electrical &amp; electronic engineering…" autocomplete="off" />
          <button type="submit" class="btn btn-primary" id="btn-send">
            <i class="bi bi-send-fill"></i>
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
const aiChat = new AIChat();
aiChat.init();
{% if sessions %}
aiChat.setSessions({{ sessions | tojson }});
{% endif %}
</script>
{% endblock %}
