{% extends 'base.html' %}
{% block title %}Register – EE Learning{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-5 col-lg-4">
    <div class="auth-card p-4 rounded-3">
      <div class="text-center mb-4">
        <i class="fa fa-bolt fa-3x" style="color:#0080ff;"></i>
        <h3 class="text-white mt-2">Create Account</h3>
        <p class="text-muted">Join EE Learning System</p>
      </div>
      <form method="POST" action="{{ url_for('register') }}">
        <div class="mb-3">
          <label for="username" class="form-label text-light">Username</label>
          <div class="input-group">
            <span class="input-group-text bg-dark border-secondary text-muted">
              <i class="fa fa-user"></i>
            </span>
            <input type="text" class="form-control bg-dark border-secondary text-white"
                   id="username" name="username" placeholder="Choose a username" required autofocus>
          </div>
        </div>
        <div class="mb-3">
          <label for="email" class="form-label text-light">Email</label>
          <div class="input-group">
            <span class="input-group-text bg-dark border-secondary text-muted">
              <i class="fa fa-envelope"></i>
            </span>
            <input type="email" class="form-control bg-dark border-secondary text-white"
                   id="email" name="email" placeholder="Enter your email" required>
          </div>
        </div>
        <div class="mb-4">
          <label for="password" class="form-label text-light">Password</label>
          <div class="input-group">
            <span class="input-group-text bg-dark border-secondary text-muted">
              <i class="fa fa-lock"></i>
            </span>
            <input type="password" class="form-control bg-dark border-secondary text-white"
                   id="password" name="password" placeholder="Create a password" required>
          </div>
        </div>
        <button type="submit" class="btn btn-primary w-100 mb-3">
          <i class="fa fa-user-plus me-2"></i>Create Account
        </button>
      </form>
      <p class="text-center text-muted mb-0">
        Already have an account?
        <a href="{{ url_for('login') }}" class="text-info">Login here</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
